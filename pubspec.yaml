name: chw_copilot
description: Offline clinical triage for Community Health Workers.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Database
  sqflite: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0

  # Audio recording — added Day 5-6 when ASR is integrated
  # record: ^5.1.2

  # Camera (Day 7: MUAC tape reader)
  camera: ^0.11.0+2

  # Location (audit trail)
  geolocator: ^13.0.3

  # Permissions
  permission_handler: ^11.3.1

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/protocols.json
